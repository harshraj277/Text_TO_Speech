<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whisper Studio</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="hdr">
    <div class="logo">WHISPER<span>STUDIO</span></div>
    <div class="pill">
      <div class="dot" id="dot"></div>
      <span id="stTxt">READY</span>
    </div>
  </div>

  <!-- Alert -->
  <div class="alert" id="alertBox">
    <span>&#9888;</span>
    <div><b id="alertTitle"></b><span id="alertMsg"></span></div>
  </div>

  <!-- Info -->
  <div class="info" id="infoBox">
    <span>&#8505;</span><span id="infoMsg"></span>
  </div>

  <!-- Waveform Canvas -->
  <div class="viz">
    <canvas id="cv"></canvas>
    <div class="viz-lbl" id="vizLbl">IDLE</div>
  </div>

  <!-- Panels -->
  <div class="panels">

    <!-- Mic -->
    <div class="panel">
      <div class="tag">01 / Microphone</div>
      <button class="rec-btn" id="recBtn" onclick="toggleRec()">
        <span class="rec-ico" id="recIco">&#9679;</span>
        <span id="recLbl">Record</span>
      </button>
      <div class="timer-row">
        <div class="timer" id="timer">00:00</div>
        <div class="rec-st" id="recSt"></div>
      </div>
    </div>

    <!-- File -->
    <div class="panel">
      <div class="tag">02 / File Upload</div>
      <label class="file-lbl" id="fileDrop" for="audioFile">
        <span>&#8679;</span><span id="fileName">Browse or Drop</span>
      </label>
      <input type="file" id="audioFile" accept="audio/*" onchange="onFileSel(this)">
      <button class="up-btn" id="upBtn" onclick="uploadAudio()">Transcribe &rarr;</button>
    </div>

  </div>

  <!-- Output -->
  <div class="output">
    <div class="out-hdr">
      <span class="tag">03 / Output</span>
      <button class="copy-btn" id="copyBtn" onclick="copyRes()">&#10063; Copy</button>
    </div>
    <div class="out-body">
      <textarea id="result" placeholder="Transcription will appear here…" readonly></textarea>
      <div class="chars" id="chars">0 chars</div>
    </div>
  </div>

</div>
<script src="js/script.js"></script>
</body>
</html>
