<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisper Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="noise"></div>

<main class="app">

    <!-- Header -->
    <header class="app-header">
        <div class="logo">
            <span class="logo-icon">◈</span>
            <span class="logo-text">WHISPER<em>STUDIO</em></span>
        </div>
        <div class="status-indicator" id="globalStatus">
            <span class="dot"></span>
            <span class="status-text">READY</span>
        </div>
    </header>

    <!-- Waveform Visualizer -->
    <div class="visualizer-wrap">
        <canvas id="waveCanvas"></canvas>
        <div class="visualizer-label" id="vizLabel">IDLE</div>
    </div>

    <!-- Controls Row -->
    <div class="controls-row">

        <!-- Mic Panel -->
        <div class="panel" id="micPanel">
            <div class="panel-tag">01 / MIC</div>
            <button id="recordBtn" class="record-btn" onclick="toggleRecording()">
                <span class="record-icon" id="recordIcon">●</span>
                <span id="recordLabel">RECORD</span>
            </button>
            <div class="timer-wrap">
                <div id="timer" class="timer hidden">00:00</div>
                <div id="recordingStatus" class="rec-status"></div>
            </div>
        </div>

        <div class="panel-divider">
            <span>OR</span>
        </div>

        <!-- Upload Panel -->
        <div class="panel" id="uploadPanel">
            <div class="panel-tag">02 / FILE</div>
            <label class="file-label" for="audioFile">
                <span class="file-icon">⬆</span>
                <span id="fileNameDisplay">DROP / BROWSE</span>
            </label>
            <input type="file" id="audioFile" accept="audio/*" onchange="onFileSelect(this)">
            <button onclick="uploadAudio()" class="upload-btn" id="uploadBtn">
                TRANSCRIBE →
            </button>
        </div>

    </div>

    <!-- Output -->
    <div class="output-section">
        <div class="output-header">
            <span class="panel-tag">03 / OUTPUT</span>
            <button onclick="copyResult()" class="copy-btn" id="copyBtn" style="display:none">
                ⧉ COPY
            </button>
        </div>
        <div class="textarea-wrap">
            <textarea id="result" placeholder="Transcription will appear here…" readonly></textarea>
            <div class="char-count" id="charCount">0 chars</div>
        </div>
    </div>

</main>

<script src="script.js"></script>
</body>
</html>
